name: Mirror to client fork

on:
  push:
  delete:
  workflow_dispatch:

jobs:
  mirror:
    # Only runs on the original repo, never on the mirrored copy
    if: github.repository == 'hack4impact-calpoly/meals-that-connect-25'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@github.com:mealsthatconnect/meals-that-connect-25.git
          ssh_private_key: ${{ secrets.MIRROR_SSH_KEY }}